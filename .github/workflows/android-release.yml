name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "github.token=${{ secrets.VOICEFX_TOKEN }}" >> local.properties
          echo "github.owner=${{ github.repository_owner }}" >> local.properties
          echo "github.repo=${{ github.event.repository.name }}" >> local.properties

      - name: Grant Gradle execution permission
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build App Bundle
        run: ./gradlew bundleRelease

      - name: Sign APK
        run: |
          # In production, use Android Signing Report or keystore from secrets
          echo "Release APK built. Sign with your keystore before publishing."

      - name: Generate release tag
        id: tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-v1.0.0-release.${{ github.run_number }}}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.VOICEFX_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag_name }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "VoiceFX $TAG" \
            --notes "Production release $TAG" \
            "app/build/outputs/apk/release/app-release.apk" \
            "app/build/outputs/bundle/release/app-release.aab" \
            "app/build/outputs/mapping/release/mapping.txt"
