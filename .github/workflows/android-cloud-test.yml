name: Android Cloud Test (Genymotion)

on:
  workflow_dispatch:
    inputs:
      instance_timeout:
        description: 'How many minutes to keep the instance alive'
        default: '15'
        required: false

jobs:
  cloud-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "github.token=${{ secrets.VOICEFX_TOKEN }}" >> local.properties
          echo "github.owner=${{ github.repository_owner }}" >> local.properties
          echo "github.repo=${{ github.event.repository.name }}" >> local.properties

      - name: Grant Gradle execution permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Install gmsaas CLI
        run: pip3 install gmsaas

      - name: Authenticate with Genymotion Cloud
        env:
          GENYMOUTH_TOKEN: ${{ secrets.GENYMOTION_TOKEN }}
        run: gmsaas auth token "$GENYMOUTH_TOKEN"

      - name: Show recipes (debug)
        run: gmsaas recipes list 2>&1 | head -20

      - name: Start Genymotion instance
        id: start_instance
        run: |
          RECIPE=$(gmsaas recipes list 2>&1 | python3 .github/scripts/genymotion_utils.py pick_recipe)
          echo "Using recipe: $RECIPE"
          INSTANCE_UUID=$(gmsaas instances start "$RECIPE" "voicefx-test-${{ github.run_number }}" 2>&1 | python3 .github/scripts/genymotion_utils.py parse_instance)
          echo "uuid=$INSTANCE_UUID" >> $GITHUB_OUTPUT
          echo "instance_uuid=$INSTANCE_UUID" >> $GITHUB_ENV
          echo "Instance started: $INSTANCE_UUID"

      - name: Connect ADB and wait for boot
        run: |
          gmsaas instances adbconnect "${{ steps.start_instance.outputs.uuid }}" || true
          for i in $(seq 1 30); do
            if adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; then
              echo "Device booted!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done

      - name: Install APK
        run: adb install app/build/outputs/apk/debug/app-debug.apk

      - name: Smoke test
        run: |
          adb shell am start -n com.voicefx/.MainActivity
          sleep 3
          adb shell pidof com.voicefx && echo "APP IS RUNNING" || echo "APP NOT FOUND"

      - name: Print web URL
        run: |
          echo ""
          echo "============================================"
          echo " Genymotion instance is running!"
          echo " Instance UUID: ${{ steps.start_instance.outputs.uuid }}"
          echo " Open in browser: https://cloud.geny.io/"
          echo "============================================"

      - name: Keep alive
        if: always()
        run: sleep $(( ${{ github.event.inputs.instance_timeout || 15 }} * 60 ))

      - name: Stop Genymotion instance
        if: always()
        run: gmsaas instances stop "${{ steps.start_instance.outputs.uuid }}"
