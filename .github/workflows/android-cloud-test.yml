name: Android Cloud Test (Genymotion)

on:
  workflow_dispatch:
    inputs:
      instance_timeout:
        description: 'How many minutes to keep the instance alive'
        default: '15'
        required: false

jobs:
  cloud-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "github.token=${{ secrets.VOICEFX_TOKEN }}" >> local.properties
          echo "github.owner=${{ github.repository_owner }}" >> local.properties
          echo "github.repo=${{ github.event.repository.name }}" >> local.properties

      - name: Grant Gradle execution permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Install gmsaas CLI
        run: pip3 install gmsaas

      - name: Authenticate
        env:
          GENYMOTION_TOKEN: ${{ secrets.GENYMOTION_TOKEN }}
        run: gmsaas auth token "$GENYMOTION_TOKEN"

      - name: Debug recipes output
        run: gmsaas recipes list 2>&1 | tee /tmp/recipes_raw.txt | python3 .github/scripts/genymotion_utils.py dump

      - name: Debug recipes UUIDs
        run: python3 .github/scripts/genymotion_utils.py all_uuids < /tmp/recipes_raw.txt

      - name: Start Genymotion instance
        id: start_instance
        run: |
          UUID=$(python3 .github/scripts/genymotion_utils.py first_uuid < /tmp/recipes_raw.txt)
          echo "Using recipe UUID: $UUID"
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          gmsaas instances start "$UUID" "voicefx-test-${{ github.run_number }}" 2>&1 | tee /tmp/instance_output.txt

      - name: Debug instance output
        run: |
          echo "=== Raw output ==="
          python3 .github/scripts/genymotion_utils.py dump < /tmp/instance_output.txt
          echo "=== UUIDs ==="
          python3 .github/scripts/genymotion_utils.py all_uuids < /tmp/instance_output.txt

      - name: Connect ADB
        run: gmsaas instances adbconnect "${{ steps.start_instance.outputs.uuid }}" 2>&1 || true

      - name: List ADB devices
        run: adb devices -l 2>&1 || true

      - name: Keep alive
        if: always()
        run: sleep $(( ${{ github.event.inputs.instance_timeout || 15 }} * 60 ))

      - name: Stop Genymotion instance
        if: always()
        run: gmsaas instances stop "${{ steps.start_instance.outputs.uuid }}" 2>&1 || true
