name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "github.token=${{ secrets.VOICEFX_TOKEN }}" >> local.properties
          echo "github.owner=${{ github.repository_owner }}" >> local.properties
          echo "github.repo=${{ github.event.repository.name }}" >> local.properties

      - name: Grant Gradle execution permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Sign APK (debug key)
        run: |
          # Debug APK is already signed with the debug keystore
          echo "Debug APK built and signed automatically"

      - name: Generate release tag
        id: tag
        run: |
          TAG_NAME="v1.0.0-build.${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.VOICEFX_TOKEN }}
        run: |
          TAG="v1.0.0-build.${{ github.run_number }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "VoiceFX $TAG" \
            --notes "Build ${{ github.run_number }} - Commit ${{ github.sha }}" \
            "app/build/outputs/apk/debug/app-debug.apk"
